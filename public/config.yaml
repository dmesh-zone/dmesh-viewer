tiers:
  dataSource:
    label: DATA SOURCE
    color: "#e2e8f0"
    bannerColor: "#cbd5e1"
    columnNumber: 1
  sourceAligned:
    label: DATA PRODUCT (SOURCE ALIGNED)
    color: "#bfdbfe"
    bannerColor: "#93c5fd"
    columnNumber: 2
  curated:
    label: DATA PRODUCT (CURATED)
    color: "#bfdbfe"
    bannerColor: "#93c5fd"
    columnNumber: 3
  consumerAligned:
    label: DATA PRODUCT (CONSUMER ALIGNED)
    color: "#bfdbfe"
    bannerColor: "#93c5fd"
    columnNumber: 4
  application:
    label: APPLICATION
    color: "#e2e8f0"
    bannerColor: "#cbd5e1"
    columnNumber: 5
  agent:
    label: AGENT
    color: "#e2e8f0"
    bannerColor: "#cbd5e1"
    columnNumber: 5

observability:
  kpis:
    dataSources:
      name: "Data sources"
      visible: true
      bgColor: "#831843"
      aggregation:
        type: count
        criteria:
          dataProductTier: ["source", "dataSource"]
    dataProducts:
      name: "Data Products"
      visible: true
      bgColor: "#1e3a8a"
      aggregation:
        type: count
        criteria:
          dataProductTier: ["sourceAligned", "curated", "consumerAligned"]
    outputPorts:
      name: "Output ports"
      visible: true
      bgColor: "#4c1d95"
      aggregation:
        type: sum
        field: outputPortCount
    recordsIngested:
      name: "Records Ingested"
      visible: true
      bgColor: "#064e3b"
      aggregation:
        type: sumMetric
        metric: "dpPipelineRecordsProcessed"
        criteria:
          dataProductTier: ["sourceAligned"]
    recordsProcessed:
      name: "Records Processed"
      visible: true
      bgColor: "#9a3412"
      aggregation:
        type: sumMetric
        metric: "dpPipelineRecordsProcessed"
        criteria:
          dataProductTier: ["curated", "consumerAligned"]
    consumingApplication:
      name: "Consuming applications"
      visible: true
      bgColor: "#0f766e"
      aggregation:
        type: count
        criteria:
          dataProductTier: ["source", "application"]
  dimensions:
    Pipeline:
      icon: "▸"
      healthCheck: "dpPipelineLastRunStateCheck"
      keyResult:
        metric: "dpPipelineLastRunStateCheck"
        text: ""
        case: upper
      secondaryMetrics:
        - metric: "dpPipelineRunDuration"
          name: "Duration"
        - metric: "dpPipelineRecordsProcessed"
          name: "Records processed"
        - metric: "dpPipelineMeanTimeBetweenFailuresCheck"
          name: "MTBF (Mean Time Between Failure)"
        - metric: "dpPipelineMeanTimeToRecoveryCheck"
          name: "MTTR (Mean Time To Recovery)"
    Consumption:
      icon: "◈"
      healthCheck: "dpOutputPortsResponseTimeCheck"
      keyResult:
        - metric: "dpOutputPortsResponseTimeCheck"
          text: "data products within expected response time"
      secondaryMetrics:
        - metric: "dpConsumerQueryCount"
          name: "Queries"
        - metric: "dpOutputPortDistinctConsumers"
          name: "Active consumers"
      dataContractCheck: "dcOutputPortsResponseTimeMeanCheck"
      dataContractMetrics:
        - metric: "dcConsumerQueryCount"
          name: "Queries"
        - metric: "dcOutputPortDistinctConsumers"
          name: "Active consumers"
    Latency:
      icon: "⧗"
      healthCheck: "dpDataLatencyMaximumCheck"
      dataContractCheck: "dcDataLatencyCheck"
      keyResult:
        metric: "dpDataLatencyMaximumCheck"
        text: "is the worse data latency"
    Quality:
      icon: "✦"
      healthCheck: "dpDataQualityRulesPassCheck"
      keyResult:
        metric: "dpDataQualityRulesPassCheck"
        text: "of DQ rules passed"
      secondaryMetrics:
        - metric: "dcDataQualityRuleCount"
          name: "Number of rules"
        - metric: "dpDataQualityRuleFailCount"
          name: "Rules Failed"
