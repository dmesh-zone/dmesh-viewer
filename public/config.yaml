tiers:
  dataSource:
    label: DATA SOURCE
    color: "#e2e8f0"
    bannerColor: "#cbd5e1"
    columnNumber: 1
  sourceAligned:
    label: DATA PRODUCT (SOURCE ALIGNED)
    color: "#bfdbfe"
    bannerColor: "#93c5fd"
    columnNumber: 2
  curated:
    label: DATA PRODUCT (CURATED)
    color: "#bfdbfe"
    bannerColor: "#93c5fd"
    columnNumber: 3
  consumerAligned:
    label: DATA PRODUCT (CONSUMER ALIGNED)
    color: "#bfdbfe"
    bannerColor: "#93c5fd"
    columnNumber: 4
  application:
    label: APPLICATION
    color: "#e2e8f0"
    bannerColor: "#cbd5e1"
    columnNumber: 5
  agent:
    label: AGENT
    color: "#e2e8f0"
    bannerColor: "#cbd5e1"
    columnNumber: 5

observability:
  kpis:
    dataSources:
      name: "Data sources"
      visible: true
      bgColor: "#831843"
      aggregation:
        type: count
        criteria:
          dataProductTier: ["source", "dataSource"]
    dataProducts:
      name: "Data Products"
      visible: true
      bgColor: "#1e3a8a"
      aggregation:
        type: count
        criteria:
          dataProductTier:
            ["sourceAligned", "consumerAligned", "analyticsAligned"]
    outputPorts:
      name: "Output ports"
      visible: true
      bgColor: "#4c1d95"
      aggregation:
        type: sum
        field: outputPortCount
    recordsIngested:
      name: "Records Ingested"
      visible: true
      bgColor: "#064e3b"
      aggregation:
        type: sumMetric
        metric: "pipelineRecordsProcessed"
        criteria:
          dataProductTier: ["sourceAligned"]
    recordsProcessed:
      name: "Records Processed"
      visible: true
      bgColor: "#9a3412"
      aggregation:
        type: sumMetric
        metric: "pipelineRecordsProcessed"
        criteria:
          dataProductTier: ["curated", "consumerAligned"]
    consumingApplication:
      name: "Consuming applications"
      visible: true
      bgColor: "#0f766e"
      aggregation:
        type: count
        criteria:
          dataProductTier: ["source", "application"]
  dimensions:
    Pipeline:
      icon: "▸"
      healthCheck: "pipelineLastRunStateCheck"
      keyResult:
        metric: "pipelineLastRunState"
        name: ""
        case: upper
      secondaryMetrics:
        - metric: "pipelineDuration"
          name: "Duration"
        - metric: "pipelineRecordsProcessed"
          name: "Records processed"
        - metric: "pipelineMeanTimeBetweenFailuresCheck"
          name: "MTBF (Mean Time Between Failure)"
        - metric: "pipelineMeanTimeToRecoveryCheck"
          name: "MTTR (Mean Time To Recovery)"
    Consumption:
      icon: "◈"
      healthCheck: "productOutputPortsResponseTimeCheck"
      keyResult:
        metric: "productConsumerQueryCount"
        name: "Queries"
      secondaryMetrics:
        - metric: "outputPortDistinctConsumers"
          name: "Active consumers"
    Latency:
      icon: "⧗"
      healthCheck: "productDataLatencyBeyondSlaCheck"
      keyResult:
        metric: "productDataLatencyMaximumAcrossAllContracts"
        name: "Max Latency"
    Quality:
      icon: "✦"
      healthCheck: "productDataQualityRulesFailCheck"
      keyResult:
        metric: "contractDataQualityRuleCount"
        name: "Rules Passed"
      secondaryMetrics:
        - metric: "contractDataQualityRuleFailCount"
          name: "Failed Rules"
